        async function geocodeLocation(locationName) {
            const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(locationName)}&count=10&language=en&format=json`);
            const data = await response.json();
            if (data.results && data.results.length > 0) {
                // If only one result, return it directly
                if (data.results.length === 1) {
                    return {
                        lat: data.results[0].latitude,
                        lon: data.results[0].longitude,
                        name: data.results[0].name,
                        country: data.results[0].country
                    };
                }
                
                // Multiple results - show picker
                return await showLocationPicker(data.results);
            }
            throw new Error('Location not found');
        }

        async function showLocationPicker(results) {
            return new Promise((resolve, reject) => {
                const modal = document.createElement('div');
                modal.className = 'location-picker-modal';
                
                const resultsHTML = results.map((result, index) => {
                    // Build a cleaner location string
                    const parts = [];
                    
                    // Always include the main name
                    parts.push(result.name);
                    
                    // Add state/region if different from name
                    if (result.admin1 && result.admin1 !== result.name) {
                        parts.push(result.admin1);
                    }
                    
                    // Add country
                    if (result.country) {
                        parts.push(result.country);
                    }
                    
                    const locationName = parts.join(', ');
                    
                    return `
                        <div class="location-option" onclick="selectLocation(${index})">
                            <div class="location-option-name">${locationName}</div>
                            <div class="location-option-coords">📍 ${result.latitude.toFixed(4)}°, ${result.longitude.toFixed(4)}°</div>
                        </div>
                    `;
                }).join('');
                
                modal.innerHTML = `
                    <div class="location-picker-content">
                        <div class="location-picker-header">
                            <h3>Select Location</h3>
                            <button class="location-picker-close" onclick="closeLocationPicker()">×</button>
                        </div>
                        <div class="location-picker-results">
                            ${resultsHTML}
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Store results and callbacks globally for onclick handlers
                window.locationPickerResults = results;
                window.locationPickerResolve = resolve;
                window.locationPickerReject = reject;
            });
        }

        function selectLocation(index) {
            const result = window.locationPickerResults[index];
            const location = {
                lat: result.latitude,
                lon: result.longitude,
                name: result.name,
                country: result.country
            };
            
            const resolve = window.locationPickerResolve;
            
            // Clear globals
            window.locationPickerResolve = null;
            window.locationPickerReject = null;
            window.locationPickerResults = null;
            
            // Remove modal
            const modal = document.querySelector('.location-picker-modal');
            if (modal) modal.remove();
            
            resolve(location);
        }

        function closeLocationPicker() {
            const reject = window.locationPickerReject;
            
            // Clear globals
            window.locationPickerResolve = null;
            window.locationPickerReject = null;
            window.locationPickerResults = null;
            
            // Remove modal
            const modal = document.querySelector('.location-picker-modal');
            if (modal) modal.remove();
            
            // Reject the promise
            if (reject) {
                reject(new Error('Location selection cancelled'));
            }
        }

            // Calculate pressure trend (3hr change)
            const pressureTrend = getPressureTrend(openMeteo.hourly);

            // Get today's sunrise and sunset
            const todaySunrise = openMeteo.daily.sunrise ? formatSunTime(openMeteo.daily.sunrise[0]) : null;
            const todaySunset = openMeteo.daily.sunset ? formatSunTime(openMeteo.daily.sunset[0]) : null;

                    </div>
                `;
            }

            // Build model confidence spread for each day
            const modelSpread = [];
            if (modelComparison && modelComparison.daily) {
                const d = modelComparison.daily;
                // Find the GFS and ECMWF keys dynamically
                const maxKeys = Object.keys(d).filter(k => k.startsWith('temperature_2m_max_'));
                const minKeys = Object.keys(d).filter(k => k.startsWith('temperature_2m_min_'));
                
                // Build model label map from key suffixes
                const modelLabels = {};
                maxKeys.forEach(k => {
                    const suffix = k.replace('temperature_2m_max_', '');
                    if (suffix.includes('gfs')) modelLabels[suffix] = 'GFS';
                    else if (suffix.includes('ecmwf')) modelLabels[suffix] = 'ECMWF';
                    else modelLabels[suffix] = suffix.toUpperCase();
                });
                
                if (maxKeys.length >= 2 && minKeys.length >= 2) {
                    const days = d.time ? d.time.length : 0;
                    for (let j = 0; j < days; j++) {
                        const highs = maxKeys.map(k => d[k][j]).filter(v => v != null);
                        const lows = minKeys.map(k => d[k][j]).filter(v => v != null);
                        
                        if (highs.length >= 2 && lows.length >= 2) {
                            const highSpread = Math.abs(Math.max(...highs) - Math.min(...highs));
                            const lowSpread = Math.abs(Math.max(...lows) - Math.min(...lows));
                            
                            // Per-model breakdown for tooltip
                            const models = maxKeys.map((k, mi) => {
                                const suffix = k.replace('temperature_2m_max_', '');
                                const minKey = minKeys[mi];
                                return {
                                    name: modelLabels[suffix] || suffix,
                                    high: d[k][j] != null ? Math.round(d[k][j]) : null,
                                    low: minKey && d[minKey][j] != null ? Math.round(d[minKey][j]) : null
                                };
                            }).filter(m => m.high != null && m.low != null);
                            
                            modelSpread.push({
                                highMin: Math.round(Math.min(...highs)),
                                highMax: Math.round(Math.max(...highs)),
                                lowMin: Math.round(Math.min(...lows)),
                                lowMax: Math.round(Math.max(...lows)),
                                highSpread: Math.round(highSpread),
                                lowSpread: Math.round(lowSpread),
                                models
                            });
                        } else {
                            modelSpread.push(null);
                        }
                    }
                }

            const forecastHTML = openMeteo.daily.time.slice(0, 7).map((date, i) => {

                const day = parseInt(dateParts[2]);
                const localDate = new Date(year, month, day);
                
                const dayName = localDate.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
                const fullDayName = localDate.toLocaleDateString('en-US', { weekday: 'long' });
                const dateDisplay = localDate.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
                
                const precipProb = openMeteo.daily.precipitation_probability_max[i] || 0;
                const precipAmount = openMeteo.daily.precipitation_sum[i] || 0;
                const snowfall = openMeteo.daily.snowfall_sum ? (openMeteo.daily.snowfall_sum[i] || 0) : 0;

                const bestHigh = Math.round(openMeteo.daily.temperature_2m_max[i]);
                const bestLow = Math.round(openMeteo.daily.temperature_2m_min[i]);
                const spread = modelSpread[i];

                        return periodStart.getFullYear() === year &&
                               periodStart.getMonth() === month &&
                               periodStart.getDate() === day;
                    });

                    if (matchingPeriods.length > 0) {
                        nwsForecastSection = `
                            <div class="nws-inline">
                                ${matchingPeriods.map(p => `
                                    <div class="nws-inline-period">
                                        <span class="nws-inline-name">${p.name}:</span>
                                        <span class="nws-inline-text">${p.detailedForecast}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                }
                
                return `
                    <div class="forecast-item">
                        <div class="forecast-day">${dayName}</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: -0.25rem; margin-bottom: 0.5rem;">${dateDisplay}</div>
                        <div class="forecast-icon">${dayCode.icon}</div>
                        <div class="forecast-temp-range ${hasSpread ? 'has-model-spread' : ''}" 
                             ${hasSpread ? `onclick="showModelTooltip(event, '${tooltipData}')" data-tooltip="${tooltipData}"` : ''}>
                            <span class="temp-high">${highDisplay}</span>
                            <span class="temp-divider">/</span>
                            <span class="temp-low">${lowDisplay}</span>
                        </div>
                        ${precipProb > 0 ? `<div class="precip-chance">💧 ${precipProb}%${precipAmount > 0 ? ` · ${precipAmount.toFixed(1)}″` : ''}</div>` : ''}
                        ${snowfall > 0 ? `<div class="snow-info">❄️ ${(snowfall / 2.54).toFixed(1)}″</div>` : ''}
                        <div class="wind-info">
                            💨 ${windSpeed}${gustSpeed ? ` / ${gustSpeed}` : ''} ${windDir}
                        </div>
                        ${nwsForecastSection}
                    </div>
                `;
            }).join('');

            // Build hourly strip (next 48 hours from current hour)
            let hourlyStripHTML = '';
            if (openMeteo.hourly && openMeteo.hourly.time) {
                const now = new Date();
                const currentHourIndex = openMeteo.hourly.time.findIndex(t => {
                    const d = new Date(t);
                    return d >= now;
                });
                const startIndex = Math.max(0, currentHourIndex);
                const endIndex = Math.min(startIndex + 48, openMeteo.hourly.time.length);
                
                let lastDay = '';
                const pills = [];
                
                for (let i = startIndex; i < endIndex; i++) {
                    const time = new Date(openMeteo.hourly.time[i]);
                    const hourCode = WEATHER_CODES[openMeteo.hourly.weather_code[i]] || WEATHER_CODES[0];
                    const temp = Math.round(openMeteo.hourly.temperature_2m[i]);
                    const precip = openMeteo.hourly.precipitation_probability[i] || 0;
                    const wind = Math.round(openMeteo.hourly.wind_speed_10m[i]);
                    const isNow = i === startIndex;
                    
                    const dayLabel = time.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
                    if (dayLabel !== lastDay && !isNow) {
                        pills.push(`<div class="hourly-day-sep">${dayLabel}</div>`);
                        lastDay = dayLabel;
                    } else if (isNow) {
                        lastDay = dayLabel;
                    }
                    
                    const timeLabel = isNow ? 'Now' : time.toLocaleTimeString('en-US', { hour: 'numeric' });
                    
                    pills.push(`
                        <div class="hourly-pill ${isNow ? 'now-pill' : ''}" data-hourly-index="${i}" onclick="toggleHourlyDetail(${i})">
                            <span class="hourly-time">${timeLabel}</span>
                            <span class="hourly-icon">${hourCode.icon}</span>
                            <span class="hourly-temp">${temp}°</span>
                            ${precip > 0 ? `<span class="hourly-precip has-precip">💧${precip}%</span>` : `<span class="hourly-precip">&nbsp;</span>`}
                            <span class="hourly-wind-mini">💨${wind}</span>
                        </div>
                    `);
                }
                
                hourlyStripHTML = `
                    <div class="card hourly-card">
                        <div class="card-header">
                            <div class="card-title">NEXT 48 HOURS — ${locLabel}</div>
                            <div class="source-badge">Hourly</div>
                        </div>
                        <div class="hourly-strip-wrapper">
                            <button class="hourly-scroll-btn scroll-left" onclick="scrollHourlyStrip(-1)">◂</button>
                            <div class="hourly-strip" id="hourlyStrip">
                                ${pills.join('')}
                            </div>
                            <button class="hourly-scroll-btn scroll-right" onclick="scrollHourlyStrip(1)">▸</button>
                        </div>
                        <div class="hourly-detail-panel" id="hourlyDetailPanel"></div>
                    </div>
                `;
            }

            // Build alert banners for Current card
            let alertBannerHTML = '';
            if (nws && nws.alerts && nws.alerts.features && nws.alerts.features.length > 0) {
                const now = new Date();
                cachedAlerts = { active: [], upcoming: [] };
                
                nws.alerts.features.forEach(alert => {
                    const onset = new Date(alert.properties.onset);
                    if (onset <= now) {
                        cachedAlerts.active.push(alert);
                    } else {
                        cachedAlerts.upcoming.push(alert);
                    }
                });
                
                const totalCount = cachedAlerts.active.length + cachedAlerts.upcoming.length;
                
                if (cachedAlerts.active.length > 0) {
                    const firstEvent = cachedAlerts.active[0].properties.event;
                    const extra = totalCount > 1 ? ` + ${totalCount - 1} more` : '';
                    alertBannerHTML += `
                        <div class="alert-banner severity-active" onclick="openAlertModal()">
                            <span class="alert-banner-icon">🚨</span>
                            <div class="alert-banner-text">
                                <div class="alert-banner-event">${firstEvent}${extra}</div>
                            </div>
                            <span class="alert-banner-arrow">▸</span>
                        </div>
                    `;
                } else if (cachedAlerts.upcoming.length > 0) {
                    const firstEvent = cachedAlerts.upcoming[0].properties.event;
                    const extra = totalCount > 1 ? ` + ${totalCount - 1} more` : '';
                    alertBannerHTML += `
                        <div class="alert-banner severity-upcoming" onclick="openAlertModal()">
                            <span class="alert-banner-icon">🔔</span>
                            <div class="alert-banner-text">
                                <div class="alert-banner-event">${firstEvent}${extra}</div>
                            </div>
                            <span class="alert-banner-arrow">▸</span>
                        </div>
                    `;
                }
            } else {
                cachedAlerts = { active: [], upcoming: [] };
            }

            container.innerHTML = `
                <div class="grid">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">CURRENT — ${locLabel}</div>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <div class="source-badge">Live</div>
                                <button class="share-btn" onclick="shareCurrentCard()" title="Share current conditions">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                                        <polyline points="16 6 12 2 8 6"/>
                                        <line x1="12" y1="2" x2="12" y2="15"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        ${alertBannerHTML}
                        <div class="weather-main">
                            <div class="temperature">${Math.round(current.temperature_2m)}°F</div>
                            <div class="weather-icon">${weatherCode.icon}</div>
                        </div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-label">Feels Like</div>
                                <div class="detail-value">${Math.round(current.apparent_temperature)}°F</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Condition</div>
                                <div class="detail-value">${weatherCode.desc}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${current.relative_humidity_2m}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Dew Point</div>
                                <div class="detail-value">${Math.round(current.dew_point_2m)}°F</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind</div>
                                <div class="detail-value">${Math.round(current.wind_speed_10m)} mph ${getWindDirection(current.wind_direction_10m)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind Gusts</div>
                                <div class="detail-value">${Math.round(current.wind_gusts_10m)} mph</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Pressure</div>
                                <div class="detail-value">${Math.round(current.pressure_msl)} hPa ${pressureTrend.arrow ? `<span style="color: ${pressureTrend.color}; font-size: 0.85rem;">${pressureTrend.arrow} ${pressureTrend.label}</span>` : ''}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">UV Index</div>
                                <div class="detail-value">${current.uv_index.toFixed(1)}</div>
                            </div>
                            ${aqiHTML}
                            <div class="detail-item">
                                <div class="detail-label">Fire Risk</div>
                                <div class="detail-value" style="color: ${fireRisk.color}">
                                    ${fireRisk.icon} ${fireRisk.level}
                                </div>
                            </div>
                            ${todaySunrise ? `
                            <div class="detail-item">
                                <div class="detail-label">Sunrise</div>
                                <div class="detail-value">${todaySunrise}</div>
                            </div>` : ''}
                            ${todaySunset ? `
                            <div class="detail-item">
                                <div class="detail-label">Sunset</div>
                                <div class="detail-value">${todaySunset}</div>
                            </div>` : ''}
                            ${(() => {
                                const moon = getMoonPhase();
                                const dirClass = moon.direction === '▼' ? 'waning' : '';
                                const moonTimes = getMoonTimes(
                                    openMeteo.daily.sunrise ? openMeteo.daily.sunrise[0] : null,
                                    openMeteo.daily.sunset ? openMeteo.daily.sunset[0] : null,
                                    moon.phase
                                );
                                return `
                                ${moonTimes.rise ? `
                                <div class="detail-item">
                                    <div class="detail-label">Moonrise</div>
                                    <div class="detail-value">${moonTimes.rise}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Moonset</div>
                                    <div class="detail-value">${moonTimes.set}</div>
                                </div>
                                ` : ''}
                                <div class="moon-phase-row">
                                    <div class="moon-icon">${moon.icon}</div>
                                    <div class="moon-info">
                                        <div class="moon-phase-name">
                                            ${moon.direction ? `<span class="moon-direction ${dirClass}">${moon.direction}</span> ` : ''}${moon.name}
                                        </div>
                                        <div class="moon-details">${moon.illumination}% · ${moon.lunarAge} of 29.5</div>
                                    </div>
                                </div>`;
                            })()}
                        </div>
                    </div>

                    <div class="card forecast-card">
                        <div class="card-header">
                            <div class="card-title">7-DAY FORECAST — ${locLabel}</div>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                ${nws ? `<button class="source-badge nws-source-btn" onclick="openNWSDrawer()">NWS</button>` : ''}
                                <div class="source-badge">Open-Meteo</div>
                            </div>
                        </div>
                        <div class="forecast-grid">
                            ${forecastHTML}
                        </div>
                    </div>
                </div>

                ${hourlyStripHTML}

                <div class="card satellite-card">
                    <!-- Radar section will be rendered by renderRadarSection -->
                </div>

                <div class="timestamp">
                    Location: ${location.name}, ${location.country} | <span style="opacity: 0.6;">v${APP_VERSION}</span>
                </div>
            `;
            
            // Render radar section with tabs
            renderRadarSection(location);
            
            // Cache temp for this location and update tabs
            cacheLocationTemp(location.name, current.temperature_2m, current.weather_code);
            updateRefreshTime();

            // Auto-open NWS drawer on mobile if preference is set
            if (nwsShowByDefault && nws && window.innerWidth <= 768) {
                setTimeout(() => openNWSDrawer(), 300);
            }

            // Fetch temps for other locations in background
            fetchAllLocationTemps();
        }

        // Initialize the dashboard
        function init() {
            console.log(`Weather Command Center v${APP_VERSION}`);
            loadSavedLocations();
            renderTabs();
            
            if (activeLocation) {
                // Use stored coordinates if available, otherwise search
                if (activeLocation.lat && activeLocation.lon) {
                    fetchWeatherDataDirect(activeLocation.lat, activeLocation.lon, activeLocation);
                } else {
                    fetchWeatherData();
                }
            } else {
                // Show welcome message for new users
                const container = document.getElementById('weatherContainer');
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 2rem 1.5rem;">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">🌤️</div>
                        <h2 style="font-family: 'Bebas Neue', cursive; font-size: clamp(1.8rem, 5vw, 2.5rem); color: var(--accent-primary); margin-bottom: 1rem; letter-spacing: 0.1rem;">Welcome to Weather Command Center</h2>
                        <p style="font-size: clamp(0.85rem, 2.5vw, 1.1rem); color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6;">
                            Get started by adding your first location.<br>
                            Click the <span style="color: var(--accent-primary); font-weight: 600;">+ Add Location</span> button above, or enter a location below.
                        </p>
                        <div style="display: flex; gap: 0.75rem; justify-content: center; align-items: center; flex-wrap: wrap;">
                            <input type="text" id="welcomeInput" class="location-input" placeholder="Enter your location (e.g., Miami, Portland)" style="max-width: 400px; width: 100%; font-size: 16px;">
                            <button onclick="addFirstLocation()" class="btn">Get Started</button>
                        </div>
                    </div>
                `;
            }
        }

        // Add first location from welcome screen
        async function addFirstLocation() {
            const input = document.getElementById('welcomeInput');
            const locationName = input ? input.value.trim() : '';
            
            if (!locationName) {
                alert('Please enter a location name');
                return;
            }
            
            try {
                const location = await geocodeLocation(locationName);
                
                const newLocation = {
                    name: location.name,
                    displayName: extractDisplayName(location.name),
                    lat: location.lat,
                    lon: location.lon,
                    country: location.country
                };
                
                savedLocations.push(newLocation);
                activeLocation = newLocation;
                saveLocations();
                renderTabs();
                fetchWeatherDataDirect(location.lat, location.lon, location);
            } catch (error) {
                if (error.message !== 'Location selection cancelled') {
                    alert('Error: ' + error.message);
                }
            }
        }

        // ===== PWA SETUP =====
        // Generate app icon dynamically (canvas-based PNG for iOS)
        function generateAppIcon() {
            const canvas = document.createElement('canvas');
            canvas.width = 180;
            canvas.height = 180;
            const ctx = canvas.getContext('2d');
            
            // Background
            const radius = 36;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(180 - radius, 0);
            ctx.quadraticCurveTo(180, 0, 180, radius);
            ctx.lineTo(180, 180 - radius);
            ctx.quadraticCurveTo(180, 180, 180 - radius, 180);
            ctx.lineTo(radius, 180);
            ctx.quadraticCurveTo(0, 180, 0, 180 - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fillStyle = '#0a0e1a';
            ctx.fill();
            
            // Gradient accent bar at top
            const grad = ctx.createLinearGradient(0, 0, 180, 0);
            grad.addColorStop(0, '#00d4ff');
            grad.addColorStop(1, '#ff6b9d');
            ctx.fillStyle = grad;
            ctx.fillRect(20, 12, 140, 4);
            
            // Emoji
            ctx.font = '80px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🌤️', 90, 100);
            
            const link = document.createElement('link');
            link.rel = 'apple-touch-icon';
            link.href = canvas.toDataURL('image/png');
            document.head.appendChild(link);
        }
        generateAppIcon();
        // Inline manifest
        const manifest = {
            name: 'Weather Command Center',
            short_name: 'Weather HQ',
            description: 'Multi-location weather dashboard',
            start_url: './',
            display: 'standalone',
            background_color: '#0a0e1a',
            theme_color: '#0a0e1a',
            orientation: 'any',
            icons: [
                {
                    src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect fill="%230a0e1a" width="512" height="512" rx="100"/><text x="256" y="350" font-size="280" text-anchor="middle">🌤️</text></svg>',
                    sizes: '512x512',
                    type: 'image/svg+xml',
                    purpose: 'any'
                },
                {
                    src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="%230a0e1a" width="192" height="192" rx="40"/><text x="96" y="132" font-size="106" text-anchor="middle">🌤️</text></svg>',
                    sizes: '192x192',
                    type: 'image/svg+xml',
                    purpose: 'any'
                }
            ]
        };

        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        // Register service worker for PWA + offline caching
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'weather-hq-v${APP_VERSION}';
                const PRECACHE_URLS = ['./', 'https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Bebas+Neue&display=swap'];

                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => cache.addAll(PRECACHE_URLS)).then(() => self.skipWaiting())
                    );
                });

                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(keys => Promise.all(
                            keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
                        )).then(() => self.clients.claim())
                    );
                });

                self.addEventListener('fetch', event => {
                    // Network-first for API calls, cache-first for assets
                    if (event.request.url.includes('api.') || event.request.url.includes('weather.gov')) {
                        event.respondWith(
                            fetch(event.request).then(response => {
                                const clone = response.clone();
                                caches.open(CACHE_NAME).then(cache => cache.put(event.request, clone));
                                return response;
                            }).catch(() => caches.match(event.request))
                        );
                    } else {
                        event.respondWith(
                            caches.match(event.request).then(cached => cached || fetch(event.request))
                        );
                    }
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL, { scope: './' }).then(reg => {
                console.log('Service Worker registered:', reg.scope);
            }).catch(err => {
                console.log('SW registration (expected if not served over HTTPS):', err.message);
            });
        }

        // Load weather on page load
        init();
    </script>
</body>
</html>
