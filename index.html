<!DOCTYPE html>
<!--
    Weather Command Center
    Version: 0.4.2
    Last Updated: 2026-02-14
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Weather HQ">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="description" content="Weather Command Center - Multi-location weather dashboard">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Weather Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #131826;
            --accent-primary: #00d4ff;
            --accent-secondary: #ff6b9d;
            --accent-warm: #ffa500;
            --text-primary: #e8edf5;
            --text-secondary: #8b95a8;
            --border: rgba(255, 255, 255, 0.1);
            --glow: rgba(0, 212, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 157, 0.06) 0%, transparent 50%);
            padding: 2rem;
            overflow-x: hidden;
        }

        .header {
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 4rem;
            letter-spacing: 0.3rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0;
            text-shadow: 0 0 40px var(--glow);
        }

        .header-refresh {
            position: absolute;
            right: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        .location-tab-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
        }

        .tab-temp {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0.8;
        }

        .location-tab.active .tab-temp {
            color: rgba(255, 255, 255, 0.85);
        }

        .refresh-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .refresh-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn.refreshing .refresh-icon {
            animation: spin 0.8s linear infinite;
        }

        .refresh-icon {
            font-size: 1rem;
            display: inline-block;
        }

        .last-updated {
            font-size: 0.55rem;
            color: var(--text-secondary);
            opacity: 0.7;
            white-space: nowrap;
        }

        .location-tabs {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.2s both;
        }
        
        .location-tabs-inner {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .location-tab {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            user-select: none;
            position: relative;
        }

        .location-tab.dragging {
            opacity: 0.4;
            transform: scale(0.95);
        }

        .location-tab.drag-over {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.15);
            transform: scale(1.05);
        }

        .drag-handle {
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: grab;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .location-tab:hover .drag-handle {
            opacity: 1;
        }

        .location-tab:active .drag-handle {
            cursor: grabbing;
        }

        .location-tab:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .location-tab.active {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-color: transparent;
            color: white;
            font-weight: 600;
        }

        .location-tab .remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: rgba(100, 100, 120, 0.7);
            border: 1.5px solid rgba(150, 150, 170, 0.4);
            color: rgba(255, 255, 255, 0.7);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.65rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            line-height: 1;
            opacity: 0;
            z-index: 5;
        }

        .location-tab:hover .remove-btn {
            opacity: 1;
        }

        /* Touch edit mode — long press reveals remove buttons */
        .location-tabs.edit-mode .location-tab .remove-btn {
            opacity: 1;
        }

        .location-tab .remove-btn:hover {
            background: rgba(150, 150, 170, 0.8);
            transform: scale(1.15);
        }

        .location-tab .remove-btn.confirm {
            background: #e53935;
            border-color: #ff5252;
            color: white;
            opacity: 1;
            width: auto;
            min-width: 18px;
            padding: 0 6px;
            border-radius: 9px;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0;
            animation: confirmPulse 0.8s ease infinite alternate;
        }

        .location-tab .remove-btn.confirm:hover {
            background: #c62828;
            transform: scale(1.05);
        }

        @keyframes confirmPulse {
            from { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.5); }
            to { box-shadow: 0 0 6px 2px rgba(229, 57, 53, 0.3); }
        }

        .location-tab.active .remove-btn {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .location-tab.active .remove-btn.confirm {
            background: #e53935;
            border-color: #ff5252;
        }

        .location-tab.add-tab {
            border-style: dashed;
            border-width: 2px;
            color: var(--accent-primary);
            font-weight: 600;
            cursor: pointer;
        }

        .location-tab.add-tab:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .location-tab.add-tab .drag-handle {
            display: none;
        }

        .location-input {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            min-width: 250px;
        }

        .location-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--glow);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 1024px) and (orientation: portrait) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: fadeInUp 0.6s ease-out both;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.15rem;
            color: var(--accent-primary);
        }

        .source-badge {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            border: 1px solid var(--accent-primary);
        }

        .share-btn {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .share-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        .share-btn:active {
            transform: scale(0.9);
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 600;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-warm) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px var(--glow));
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .moon-phase-row {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-top: 1px solid var(--border);
            margin-top: 0.25rem;
        }

        .moon-icon {
            font-size: 2rem;
            line-height: 1;
        }

        .moon-info {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .moon-phase-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .moon-direction {
            color: var(--accent-warm);
            font-size: 0.75rem;
        }

        .moon-direction.waning {
            color: var(--accent-primary);
        }

        .moon-details {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .forecast-card .forecast-grid {
            grid-template-columns: repeat(7, 1fr);
        }

        @media (max-width: 1400px) {
            .forecast-card .forecast-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .forecast-card .forecast-grid {
                grid-template-columns: repeat(7, 1fr);
            }
        }

        @media (max-width: 768px) {
            .forecast-card .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            }
        }

        .forecast-item {
            text-align: center;
            padding: 1.5rem 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-height: 220px;
        }

        .forecast-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-primary);
        }

        .forecast-day {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 0.3rem 0;
        }

        .forecast-temp-range {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .temp-high {
            color: var(--accent-warm);
        }

        .temp-divider {
            color: var(--text-secondary);
        }

        .temp-low {
            color: var(--accent-primary);
        }

        .has-model-spread {
            cursor: pointer;
            position: relative;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 2px;
        }

        .model-tooltip {
            position: fixed;
            background: var(--bg-dark);
            border: 1px solid var(--accent-primary);
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            z-index: 9999;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            animation: tooltipFade 0.2s ease-out;
        }

        @keyframes tooltipFade {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .forecast-temp {
            font-size: 1rem;
            font-weight: 600;
        }

        .precip-chance {
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .wind-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .snow-info {
            font-size: 0.8rem;
            color: #b3e5fc;
            font-weight: 600;
        }

        .nws-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
        }

        .nws-text {
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        .nws-source-btn {
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'JetBrains Mono', monospace;
        }
        .nws-source-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        /* On desktop, hide the NWS header button — inline text shows instead */
        @media (min-width: 769px) {
            .nws-source-btn { display: none; }
        }

        .nws-inline {
            margin-top: 0.5rem;
            text-align: left;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            padding-top: 0.5rem;
        }
        .nws-inline-period {
            font-size: 0.65rem;
            line-height: 1.4;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }
        .nws-inline-name {
            color: var(--accent-primary);
            font-weight: 600;
        }
        /* Hide inline NWS on mobile — the drawer handles it */
        @media (max-width: 768px) {
            .nws-inline { display: none; }
        }

        .today-tonight-card {
            margin-bottom: 1.5rem;
        }

        .today-tonight-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .today-tonight-grid {
                grid-template-columns: 1fr;
            }
        }

        .today-tonight-period {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .today-tonight-period:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-primary);
        }

        .period-name-large {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.15rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--accent-primary);
        }

        .period-forecast {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .satellite-card {
            margin-bottom: 2rem;
            overflow: visible !important;
            transition: none !important;
            transform: none !important;
            animation: none !important;
        }

        /* Prevent card hover effects from interfering with Windy iframe interaction */
        .card.satellite-card:hover {
            transform: none !important;
            box-shadow: none;
            border-color: var(--border);
        }

        .card.satellite-card::before {
            display: none;
        }

        .satellite-container {
            margin-top: 1rem;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .satellite-container iframe {
            display: block;
        }

        .radar-tabs {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .radar-tab {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            user-select: none;
        }

        .radar-tab:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .radar-tab.active {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-color: transparent;
            color: white;
            font-weight: 600;
        }

        .radar-tab-icon {
            font-size: 1rem;
        }

        .forecast-timeline-toggle {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            user-select: none;
            margin-left: auto;
        }

        .forecast-timeline-toggle:hover {
            border-color: var(--accent-warm);
            background: rgba(255, 165, 0, 0.1);
            transform: translateY(-2px);
        }

        .toggle-icon {
            font-size: 1rem;
        }

        .toggle-text {
            font-size: 0.75rem;
        }

        .location-picker-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        .location-picker-content {
            background: var(--bg-card);
            border: 2px solid var(--accent-primary);

            max-width: 600px;
            width: 90%;
            max-height: 80vh;

        .location-picker-header h3 {

        .location-picker-results {

        .location-option {

            padding: 1rem;
            margin-bottom: 0.8rem;

        .location-option:hover {

        .location-option-name {

            margin-bottom: 0.3rem;

        .location-option-coords {

            color: var(--text-secondary);

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2) 0%, rgba(255, 165, 0, 0.2) 100%);
            border: 2px solid var(--accent-secondary);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        /* ===== COMPACT ALERT BANNER (inside Current card) ===== */
        .alert-banner {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .alert-banner:hover {
            filter: brightness(1.15);
        }

        .alert-banner.severity-active {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2) 0%, rgba(255, 107, 0, 0.15) 100%);
            border: 1.5px solid rgba(255, 68, 68, 0.6);
        }

        .alert-banner.severity-upcoming {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.15) 0%, rgba(255, 152, 0, 0.1) 100%);
            border: 1.5px solid rgba(255, 193, 7, 0.5);
        }

        .alert-banner-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
            animation: alertPulse 1.5s ease-in-out infinite;
        }

        @keyframes alertPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.15); }
        }

        .alert-banner-text {
            flex: 1;
            min-width: 0;
        }

        .alert-banner-event {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            color: #ff6b6b;
        }

        .alert-banner.severity-upcoming .alert-banner-event {
            color: #ffd54f;
        }

        .alert-banner-count {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 0.1rem;
        }

        .alert-banner-arrow {
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        /* ===== ALERT MODAL ===== */
        .alert-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .alert-modal-overlay.visible {
            display: flex;
        }

        .alert-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 650px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeInUp 0.25s ease-out;
        }

        .alert-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;

            border-bottom: 2px solid rgba(255, 68, 68, 0.3);
            flex-shrink: 0;
        }

        .alert-modal-header h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.6rem;
            letter-spacing: 0.1rem;
            color: #ff4444;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .alert-modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .alert-modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .alert-modal-body {
            overflow-y: auto;
            padding: 1.5rem;
            flex: 1;
        }

        .alert-modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .alert-modal-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .alert-modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .modal-alert-item {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid #ff4444;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .modal-alert-item:last-child {
            margin-bottom: 0;
        }

        .modal-alert-item.upcoming {
            border-left-color: #ffc107;
        }

        .modal-alert-event {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 0.3rem;
        }

        .modal-alert-item.upcoming .modal-alert-event {
            color: #ffd54f;
        }

        .modal-alert-headline {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .modal-alert-onset {
            font-size: 0.8rem;
            color: #ffc107;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        .modal-alert-description {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .modal-alert-instruction {
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 193, 7, 0.1);
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #ffd54f;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .modal-section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            margin-top: 1rem;
            opacity: 0.7;
        }

        .modal-section-label:first-child {
            margin-top: 0;
        }

        /* NWS Forecast Modal */

        }
        .nws-modal-close {

            cursor: pointer;
            width: 36px;

            border-radius: 8px;

            justify-content: center;

        }

        }
        .nws-modal-body {
            overflow-y: auto;

        .nws-modal-body::-webkit-scrollbar {

        .nws-modal-body::-webkit-scrollbar-track {

        .nws-modal-footer {

        .nws-default-toggle {

            align-items: center;

            cursor: pointer;
        }
        .nws-default-toggle input {

        }

        .nws-forecast-card {
            margin-bottom: 1.5rem;
        }

        .nws-forecast-content {
            margin-top: 1rem;
        }

        .nws-forecast-period {
            padding: 1rem;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;

        }

        .nws-period-name {

        .nws-forecast-text {
            font-size: 1rem;

            color: var(--text-primary);
            padding: 0 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        .comparison-card {
            grid-column: 1 / -1;
        }

        .comparison-table {
            width: 100%;
            margin-top: 1rem;
            border-collapse: separate;
            border-spacing: 0;
        }

        .comparison-table th {
            background: rgba(0, 212, 255, 0.1);
            padding: 1rem;
            text-align: left;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.2rem;
            letter-spacing: 0.1rem;
            color: var(--accent-primary);
            border-bottom: 2px solid var(--accent-primary);
        }

        .comparison-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .comparison-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .timestamp {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 2rem;
            opacity: 0.7;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* ===== HOURLY STRIP STYLES ===== */
        .hourly-card {
            margin-bottom: 1.5rem;
        }

        .hourly-strip-wrapper {
            position: relative;
            margin-top: 1rem;
        }

        .hourly-strip {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0.25rem 0.75rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-primary) transparent;
        }

        .hourly-strip::-webkit-scrollbar {
            height: 4px;
        }

        .hourly-strip::-webkit-scrollbar-track {
            background: transparent;
        }

        .hourly-strip::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }

        .hourly-scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-60%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            z-index: 10;
            transition: all 0.2s ease;
            opacity: 0.8;
        }

        .hourly-scroll-btn:hover {
            opacity: 1;
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
        }

        .hourly-scroll-btn.scroll-left {
            left: -4px;
        }

        .hourly-scroll-btn.scroll-right {
            right: -4px;
        }

        @media (pointer: coarse) {
            .hourly-scroll-btn {
                display: none;
            }
        }

        .hourly-pill {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            padding: 0.8rem 0.7rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 72px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .hourly-pill:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.06);
        }

        .hourly-pill.active {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.12);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.15);
        }

        .hourly-pill.now-pill {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.08);
        }

        .hourly-pill.now-pill .hourly-time {
            color: var(--accent-primary);
            font-weight: 700;
        }

        .hourly-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.03rem;
            white-space: nowrap;
        }

        .hourly-icon {
            font-size: 1.4rem;
        }

        .hourly-temp {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .hourly-precip {
            font-size: 0.65rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .hourly-precip.has-precip {
            color: #4fc3f7;
        }

        .hourly-wind-mini {
            font-size: 0.6rem;
            color: var(--text-secondary);
        }

        /* Day separator in the strip */
        .hourly-day-sep {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 0.3rem;
            writing-mode: vertical-lr;
            text-orientation: mixed;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            opacity: 0.7;
            min-width: 20px;
        }

        /* Expanded detail panel */
        .hourly-detail-panel {
            margin-top: 0.75rem;
            padding: 1.25rem;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            display: none;
            animation: fadeInUp 0.25s ease-out;
        }

        .hourly-detail-panel.visible {
            display: block;
        }

        .hourly-detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .hourly-detail-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            letter-spacing: 0.1rem;
            color: var(--accent-primary);
        }

        .hourly-detail-close {
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .hourly-detail-close:hover {
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
        }

        .hourly-detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.75rem;
        }

        .hourly-detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .hourly-detail-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08rem;
        }

        .hourly-detail-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .hourly-pill {
                min-width: 64px;
                padding: 0.7rem 0.5rem;
                gap: 0.3rem;
            }
            .hourly-time {
                font-size: 0.65rem;
            }
            .hourly-icon {
                font-size: 1.2rem;
            }
            .hourly-temp {
                font-size: 0.95rem;
            }
            .hourly-detail-panel {
                padding: 1rem;
            }
            .hourly-detail-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .hourly-detail-title {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 400px) {
            .hourly-pill {
                min-width: 58px;
                padding: 0.6rem 0.4rem;
            }
        }

        /* ===== REORDER MODE STYLES ===== */
        /* ===== TOUCH DRAG REORDER ===== */
        .touch-drag-source {
            opacity: 0.3;
            border: 2px dashed var(--accent-primary) !important;
        }

        .touch-drag-over {
            border: 2px solid var(--accent-primary) !important;
            background: rgba(0, 212, 255, 0.15) !important;
            transform: scale(1.02);
        }

        .touch-drag-clone .remove-btn {
            display: none !important;
        }

        /* ===== TOUCH DEVICE DETECTION ===== */
        @media (pointer: coarse) {
            .drag-handle {
                display: none;
            }
            .location-tab {
                padding: 0.7rem 1rem;
                min-height: 44px;
                font-size: 0.8rem;
            }
            .location-tab .remove-btn {
                opacity: 1;
                width: 22px;
                height: 22px;
                min-width: 22px;
                font-size: 0.7rem;
                top: -7px;
                right: -7px;
            }
            .location-tab.add-tab {
                min-height: 44px;
            }
        }

        /* ===== TABLET PORTRAIT — 768px to 1024px portrait (matches mobile layout) ===== */
        @media (max-width: 1024px) and (min-width: 769px) and (orientation: portrait) {
            body {
                padding: 1rem;
            }
            .header {
                margin-bottom: 1.5rem;
            }
            .header h1 {
                font-size: 2.8rem;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin-bottom: 1rem;
            }
            .card {
                padding: 1.1rem;
            }
            .hourly-card {
                margin-bottom: 1rem;
            }
            .satellite-card {
                margin-bottom: 1rem;
            }
            /* Horizontal scroll forecast like mobile */
            .forecast-card .forecast-grid {
                display: flex;
                overflow-x: auto;

<body>
    <div class="header">
        <div class="header-top">
            <h1>WEATHER COMMAND CENTER</h1>
            <div class="header-refresh">
                <button class="refresh-btn" id="refreshBtn" onclick="refreshWeather()">
                    <span class="refresh-icon" id="refreshIcon">↻</span>
                </button>
                <span class="last-updated" id="lastUpdated"></span>
            </div>
        </div>
        <div id="locationTabs" class="location-tabs"></div>
    </div>

    <div id="weatherContainer"></div>

    <!-- Alert Modal -->
    <div class="alert-modal-overlay" id="alertModal" onclick="if(event.target===this)closeAlertModal()">
        <div class="alert-modal">
            <div class="alert-modal-header">
                <h2>⚠️ Weather Alerts</h2>
                <button class="alert-modal-close" onclick="closeAlertModal()">✕</button>
            </div>
            <div class="alert-modal-body" id="alertModalBody"></div>
        </div>
    </div>

    <div class="nws-modal-overlay" id="nwsModal" onclick="if(event.target===this)closeNWSModal()">
        <div class="nws-modal">
            <div class="nws-modal-header">
                <h2 id="nwsModalTitle">NWS Forecast</h2>
                <button class="nws-modal-close" onclick="closeNWSModal()">✕</button>
            </div>
            <div class="nws-modal-body" id="nwsModalBody"></div>
            <div class="nws-modal-footer">
                <label class="nws-default-toggle">
                    <input type="checkbox" id="nwsDefaultCheck" onchange="toggleNWSDefault()">
                    <span>Show on load</span>
                </label>
            </div>
        </div>
    </div>

    <script>
        // Version
        const APP_VERSION = '0.4.2';
        
        // Location management
        let savedLocations = [];
        let activeLocation = null;
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let lastRefreshTime = null;
        let locationTemps = {}; // keyed by location name
        let lastNWSData = null;
        let nwsShowByDefault = false;

        // Load saved locations from localStorage
        function loadSavedLocations() {
            const stored = localStorage.getItem('weatherLocations');
            if (stored) {
                savedLocations = JSON.parse(stored);
            } else {
                // Start with empty locations for new users
                savedLocations = [];
            }
            nwsShowByDefault = localStorage.getItem('nwsShowByDefault') === 'true';
            
            const activeLocationName = localStorage.getItem('activeLocation');
            if (activeLocationName) {
                activeLocation = savedLocations.find(loc => loc.name === activeLocationName) || savedLocations[0];
            } else if (savedLocations.length > 0) {
                activeLocation = savedLocations[0];
            } else {
                activeLocation = null;
            }
        }

        // Save locations to localStorage
        function saveLocations() {
            localStorage.setItem('weatherLocations', JSON.stringify(savedLocations));
            if (activeLocation) {
                localStorage.setItem('activeLocation', activeLocation.name);
            }
        }

        // Render location tabs
        function renderTabs() {
            const tabsContainer = document.getElementById('locationTabs');
            
            const locationTabs = savedLocations.map((loc, index) => {
                const isFirst = index === 0;
                const isLast = index === savedLocations.length - 1;
                
                return `
                <div class="location-tab ${activeLocation && activeLocation.name === loc.name ? 'active' : ''}" 
                     ${!isTouchDevice ? 'draggable="true"' : ''}
                     data-index="${index}"
                     onclick="${`switchLocation(${index})`}"
                     ${!isTouchDevice ? `ondragstart="handleDragStart(event, ${index})"
                     ondragover="handleDragOver(event)"
                     ondrop="handleDrop(event, ${index})"
                     ondragend="handleDragEnd(event)"` : ''}>
                    ${!isTouchDevice ? '<span class="drag-handle">⋮⋮</span>' : ''}
                    <div class="location-tab-content">
                        <span>${loc.displayName}</span>
                        ${locationTemps[loc.name] ? `<span class="tab-temp">${(WEATHER_CODES[locationTemps[loc.name].code] || WEATHER_CODES[0]).icon} ${locationTemps[loc.name].temp}°F</span>` : ''}
                    </div>
                    ${savedLocations.length > 1 ? `<button class="remove-btn" onclick="event.stopPropagation(); confirmRemove(this, ${index})" title="Remove location">×</button>` : ''}
                </div>
            `}).join('');
            
            const addButton = `
                <div class="location-tab add-tab" onclick="showAddLocationPrompt()">
                    <span style="font-size: 1.2rem;">+</span>
                    Add Location
                </div>
            `;
            
            tabsContainer.innerHTML = `<div class="location-tabs-inner">${locationTabs}${addButton}</div>`;
            
            // Re-attach long-press listeners on touch devices
            if (isTouchDevice) {
                initTouchReorder();
            }
        }

        // ===== TOUCH LONG-PRESS REORDER SYSTEM =====
        let touchDragState = {
            timer: null,
            isDragging: false,
            editMode: false,
            editModeTimer: null,
            editModeClickHandler: null,
            dragIndex: null,
            clone: null,
            startX: 0,
            startY: 0,
            offsetX: 0,
            tabs: [],
            scrollContainer: null,
            prevented: false,
            longPressTab: null,
            longPressIndex: null,
            longPressTouch: null
        };

        function exitEditMode() {
            document.getElementById('locationTabs').classList.remove('edit-mode');
            touchDragState.editMode = false;
            clearTimeout(touchDragState.editModeTimer);
            if (touchDragState.editModeClickHandler) {
                document.removeEventListener('click', touchDragState.editModeClickHandler);
                touchDragState.editModeClickHandler = null;
            }
        }

        function initTouchReorder() {
            const tabs = document.querySelectorAll('.location-tab:not(.add-tab)');
            tabs.forEach(tab => {
                tab.addEventListener('touchstart', onTouchStart, { passive: false });
                tab.addEventListener('touchmove', onTouchMove, { passive: false });
                tab.addEventListener('touchend', onTouchEnd, { passive: false });
                tab.addEventListener('touchcancel', onTouchEnd, { passive: false });
            });
        }

        function onTouchStart(e) {
            const tab = e.currentTarget;
            const index = parseInt(tab.dataset.index);
            if (isNaN(index)) return;

            const touch = e.touches[0];
            touchDragState.startX = touch.clientX;
            touchDragState.startY = touch.clientY;
            touchDragState.prevented = false;
            touchDragState.longPressTab = tab;
            touchDragState.longPressIndex = index;
            touchDragState.longPressTouch = { clientX: touch.clientX, clientY: touch.clientY };

            // Long-press timer (600ms) → enter edit mode
            touchDragState.timer = setTimeout(() => {
                if (navigator.vibrate) navigator.vibrate(50);
                touchDragState.editMode = true;
                touchDragState.prevented = true;
                document.getElementById('locationTabs').classList.add('edit-mode');

                // Auto-exit after 5 seconds
                clearTimeout(touchDragState.editModeTimer);
                touchDragState.editModeTimer = setTimeout(exitEditMode, 5000);

                // Exit on outside tap (delayed to avoid catching this touch)
                setTimeout(() => {
                    const handler = function(evt) {
                        if (!evt.target.closest('.remove-btn') && !evt.target.closest('.remove-btn.confirm')) {
                            exitEditMode();
                            document.removeEventListener('click', handler);
                            touchDragState.editModeClickHandler = null;
                        }
                    };
                    touchDragState.editModeClickHandler = handler;
                    document.addEventListener('click', handler);
                }, 300);
            }, 600);
        }

        function onTouchMove(e) {
            const touch = e.touches[0];

            // If already dragging, move the clone
            if (touchDragState.isDragging) {
                e.preventDefault();
                e.stopPropagation();
                const x = touch.clientX - touchDragState.offsetX;
                const y = touch.clientY;
                touchDragState.clone.style.left = x + 'px';
                touchDragState.clone.style.top = (y - 25) + 'px';
                highlightDropTarget(touch.clientX, touch.clientY);
                return;
            }

            const dx = Math.abs(touch.clientX - touchDragState.startX);
            const dy = Math.abs(touch.clientY - touchDragState.startY);

            // If in edit mode (long press fired) and finger moves, transition to drag
            if (touchDragState.editMode && !touchDragState.isDragging && (dx > 10 || dy > 10)) {
                exitEditMode();
                startTouchDrag(touchDragState.longPressTab, touchDragState.longPressIndex, touchDragState.longPressTouch);
                return;
            }

            // If moved before long-press fires, cancel it (allow normal scroll)
            if (dx > 10 || dy > 10) {
                clearTimeout(touchDragState.timer);
            }
        }

        function onTouchEnd(e) {
            clearTimeout(touchDragState.timer);

            if (touchDragState.isDragging) {
                e.preventDefault();
                e.stopPropagation();
                completeTouchDrag();
                return;
            }

            // If in edit mode (long press fired, no drag), stay in edit mode
            // The X buttons are now visible for the user to tap
            if (touchDragState.editMode) {
                e.preventDefault();
                e.stopPropagation();
                return;
            }
        }

        function startTouchDrag(tab, index, touch) {
            touchDragState.isDragging = true;
            touchDragState.dragIndex = index;
            
            // Haptic feedback if available
            if (navigator.vibrate) navigator.vibrate(50);
            
            // Create floating clone
            const rect = tab.getBoundingClientRect();
            const clone = tab.cloneNode(true);
            clone.className = 'location-tab touch-drag-clone';
            clone.style.cssText = `
                position: fixed;
                left: ${rect.left}px;
                top: ${rect.top}px;
                width: ${rect.width}px;
                z-index: 10001;
                opacity: 0.9;
                transform: scale(1.05);
                box-shadow: 0 8px 25px rgba(0,0,0,0.5);
                border: 2px solid var(--accent-primary);
                pointer-events: none;
                transition: none;
            `;
            document.body.appendChild(clone);
            touchDragState.clone = clone;
            touchDragState.offsetX = touch.clientX - rect.left;
            
            // Dim the original tab
            tab.classList.add('touch-drag-source');
            
            // Mark all tabs for drop targeting
            touchDragState.tabs = Array.from(document.querySelectorAll('.location-tab:not(.add-tab)'));
            
            // Prevent the tab's onclick from firing
            touchDragState.prevented = true;
        }

        function highlightDropTarget(cx, cy) {
            let closestIdx = -1;
            let closestDist = Infinity;
            
            touchDragState.tabs.forEach((tab, i) => {
                tab.classList.remove('touch-drag-over');
                const r = tab.getBoundingClientRect();
                const tabCx = r.left + r.width / 2;
                const dist = Math.abs(cx - tabCx);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestIdx = i;
                }
            });
            
            if (closestIdx >= 0 && closestIdx !== touchDragState.dragIndex) {
                touchDragState.tabs[closestIdx].classList.add('touch-drag-over');
            }
        }

        function completeTouchDrag() {
            // Find which tab we're dropping on
            const overTab = touchDragState.tabs.find(t => t.classList.contains('touch-drag-over'));
            
            if (overTab) {
                const dropIndex = parseInt(overTab.dataset.index);
                const dragIndex = touchDragState.dragIndex;
                
                if (!isNaN(dropIndex) && dragIndex !== dropIndex) {
                    const dragged = savedLocations[dragIndex];
                    savedLocations.splice(dragIndex, 1);
                    savedLocations.splice(dropIndex, 0, dragged);
                    saveLocations();
                    if (navigator.vibrate) navigator.vibrate(30);
                }
            }
            
            // Clean up
            if (touchDragState.clone) {
                touchDragState.clone.remove();
            }
            touchDragState.tabs.forEach(t => {
                t.classList.remove('touch-drag-over');
                t.classList.remove('touch-drag-source');
            });
            
            touchDragState.isDragging = false;
            touchDragState.dragIndex = null;
            touchDragState.clone = null;
            
            renderTabs();
        }

        // Cache temperature for a location and re-render tabs
        function cacheLocationTemp(locationName, temp, weatherCode) {
            locationTemps[locationName] = { temp: Math.round(temp), code: weatherCode };
            renderTabs();
        }

        // Fetch current temps for all non-active locations in background
        async function fetchAllLocationTemps() {
            for (const loc of savedLocations) {
                if (!loc.lat || !loc.lon) continue;
                if (locationTemps[loc.name]) continue; // already have it
                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.current) {
                        locationTemps[loc.name] = { 
                            temp: Math.round(data.current.temperature_2m), 
                            code: data.current.weather_code 
                        };
                        renderTabs();
                    }
                } catch (e) {
                    console.log('Background temp fetch failed for', loc.name);
                }
            }
        }

        // Update the last refresh timestamp
        function updateRefreshTime() {
            lastRefreshTime = new Date();
            const el = document.getElementById('lastUpdated');

        function handleDragStart(event, index) {
            draggedIndex = index;

            event.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const target = event.currentTarget;
            if (target.classList.contains('location-tab') && !target.classList.contains('add-tab')) {
                target.classList.add('drag-over');
            }
        }

        function handleDrop(event, dropIndex) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            
            if (draggedIndex === null || draggedIndex === dropIndex) return;
            
            // Reorder the locations array
            const draggedLocation = savedLocations[draggedIndex];
            savedLocations.splice(draggedIndex, 1);
            savedLocations.splice(dropIndex, 0, draggedLocation);
            
            saveLocations();
            renderTabs();
        }

        function handleDragEnd(event) {
            event.currentTarget.classList.remove('dragging');
            // Remove drag-over class from all tabs
            document.querySelectorAll('.location-tab').forEach(tab => {

        // Add a new location
        async function addNewLocation(locationName) {
            try {
                const location = await geocodeLocation(locationName);
                
                // Check if location already exists by coordinates
                const exists = savedLocations.find(loc => 
                    loc.lat && Math.abs(loc.lat - location.lat) < 0.01 && 
                    loc.lon && Math.abs(loc.lon - location.lon) < 0.01
                );
                if (exists) {
                    alert('This location is already saved!');
                    return;
                }
                
                const newLocation = {
                    name: location.name,
                    displayName: extractDisplayName(location.name),
                    lat: location.lat,
                    lon: location.lon,
                    country: location.country
                };
                
                savedLocations.push(newLocation);
                activeLocation = newLocation;
                saveLocations();
                renderTabs();
                fetchWeatherDataDirect(location.lat, location.lon, location);
            } catch (error) {
                if (error.message !== 'Location selection cancelled') {
                    alert('Error: ' + error.message);
                }
            }
        }

        // Remove a location

        let confirmTimer = null;

        function confirmRemove(btn, index) {
            // Already in confirm state — do the delete
            if (btn.classList.contains('confirm')) {
                clearTimeout(confirmTimer);
                removeLocation(index);
                return;

            // Clear any other confirm buttons
            document.querySelectorAll('.remove-btn.confirm').forEach(b => {
                b.classList.remove('confirm');
                b.textContent = '×';
            });
            clearTimeout(confirmTimer);
            
            // Enter confirm state
            btn.classList.add('confirm');
            btn.textContent = '✕';
            
            // Auto-revert after 3 seconds
            confirmTimer = setTimeout(() => {
                if (btn.classList.contains('confirm')) {
                    btn.classList.remove('confirm');
                    btn.textContent = '×';
                }
            }, 3000);

        function calculateFireRisk(temp, humidity, windSpeed) {
            // Simple fire risk calculation based on temperature, humidity, and wind
            let risk = 0;
            
            // Temperature factor (higher temp = higher risk)
            if (temp > 85) risk += 3;
            else if (temp > 75) risk += 2;
            else if (temp > 65) risk += 1;
            
            // Humidity factor (lower humidity = higher risk)
            if (humidity < 20) risk += 3;
            else if (humidity < 30) risk += 2;
            else if (humidity < 40) risk += 1;
            
            // Wind factor (higher wind = higher risk)
            if (windSpeed > 20) risk += 2;
            else if (windSpeed > 15) risk += 1;
            
            if (risk >= 7) return { level: 'Extreme', color: '#8b0000', icon: '🔥🔥🔥' };
            if (risk >= 5) return { level: 'High', color: '#ff4500', icon: '🔥🔥' };
            if (risk >= 3) return { level: 'Moderate', color: '#ffa500', icon: '🔥' };
            return { level: 'Low', color: '#90ee90', icon: '✓' };
        }

        // ===== MOON PHASE CALCULATION =====
        function getMoonPhase(date = new Date()) {
            // Known new moon reference: Jan 6, 2000 18:14 UTC
            const refNewMoon = new Date(Date.UTC(2000, 0, 6, 18, 14, 0));
            const synodicMonth = 29.53058770576;

            const daysSinceRef = (date.getTime() - refNewMoon.getTime()) / (1000 * 60 * 60 * 24);
            const lunarAge = ((daysSinceRef % synodicMonth) + synodicMonth) % synodicMonth;
            const illumination = Math.round((1 - Math.cos(2 * Math.PI * lunarAge / synodicMonth)) / 2 * 100);

            // Phase breakdown (8 phases)
            const phase = lunarAge / synodicMonth; // 0 to 1
            let name, icon, direction;

            if (phase < 0.0625) {
                name = 'New Moon'; icon = '🌑'; direction = '';
            } else if (phase < 0.1875) {
                name = 'Waxing Crescent'; icon = '🌒'; direction = '▲';
            } else if (phase < 0.3125) {
                name = 'First Quarter'; icon = '🌓'; direction = '▲';
            } else if (phase < 0.4375) {
                name = 'Waxing Gibbous'; icon = '🌔'; direction = '▲';
            } else if (phase < 0.5625) {
                name = 'Full Moon'; icon = '🌕'; direction = '';
            } else if (phase < 0.6875) {
                name = 'Waning Gibbous'; icon = '🌖'; direction = '▼';
            } else if (phase < 0.8125) {
                name = 'Last Quarter'; icon = '🌗'; direction = '▼';
            } else if (phase < 0.9375) {
                name = 'Waning Crescent'; icon = '🌘'; direction = '▼';
            } else {
                name = 'New Moon'; icon = '🌑'; direction = '';
            }

            return { name, icon, illumination, direction, lunarAge: Math.round(lunarAge * 10) / 10, phase };
        }

        // Approximate moonrise/moonset from lunar age and sunrise/sunset times
        function getMoonTimes(sunriseISO, sunsetISO, lunarPhase) {
            if (!sunriseISO || !sunsetISO) return { rise: null, set: null };
            
            const sunrise = new Date(sunriseISO);
            const sunset = new Date(sunsetISO);
            const sunriseMs = sunrise.getTime();
            
            // Moon rises ~50 min later each day. At new moon, rises near sunrise.
            // Offset moonrise by (phase * 24h) from sunrise
            const offsetMs = lunarPhase * 24 * 60 * 60 * 1000;
            const moonriseMs = sunriseMs + offsetMs;
            
            // Moon is above horizon ~12h on average (varies by latitude, but good approx)
            const moonsetMs = moonriseMs + 12 * 60 * 60 * 1000;
            
            const fmt = (d) => new Date(d).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            return { rise: fmt(moonriseMs), set: fmt(moonsetMs) };
        }

        // ===== PRESSURE TREND (3hr change from hourly data) =====
        function getPressureTrend(hourlyData) {
            if (!hourlyData || !hourlyData.pressure_msl || !hourlyData.time) {
                return { arrow: '', change: 0, color: 'var(--text-secondary)', label: '' };
            }

            const now = new Date();
            let currentIdx = -1;
            for (let i = 0; i < hourlyData.time.length; i++) {
                if (new Date(hourlyData.time[i]) >= now) {
                    currentIdx = i;
                    break;
                }
            }
            if (currentIdx < 3) {
                return { arrow: '', change: 0, color: 'var(--text-secondary)', label: '' };
            }

            const currentP = hourlyData.pressure_msl[currentIdx];
            const pastP = hourlyData.pressure_msl[currentIdx - 3];
            if (currentP == null || pastP == null) {
                return { arrow: '', change: 0, color: 'var(--text-secondary)', label: '' };
            }

            const change = Math.round((currentP - pastP) * 10) / 10;
            const abs = Math.abs(change);

            let arrow, color;
            if (abs < 0.5) {
                arrow = '→'; color = 'var(--text-secondary)';
            } else if (change > 0) {
                arrow = abs >= 3 ? '⬆' : abs >= 1.5 ? '↑' : '↗';
                color = 'var(--accent-primary)';
            } else {
                arrow = abs >= 3 ? '⬇' : abs >= 1.5 ? '↓' : '↘';
                color = 'var(--accent-warm)';
            }

            const sign = change > 0 ? '+' : '';
            return { arrow, change, color, label: `${sign}${change}` };
        }

            const rect = event.currentTarget.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            
            let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
            let top = rect.bottom + 8;
            
            // Keep on screen
            if (left < 8) left = 8;
            if (left + tooltipRect.width > window.innerWidth - 8) left = window.innerWidth - tooltipRect.width - 8;
            if (top + tooltipRect.height > window.innerHeight - 8) top = rect.top - tooltipRect.height - 8;
            
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
            activeTooltip = tooltip;
            
            // Auto dismiss after 3 seconds
            setTimeout(dismissModelTooltip, 3000);

        // Flatten canvas onto an opaque background — removes any alpha channel
        // so iOS won't dim the shared image
        function flattenToOpaqueCanvas(srcCanvas, bg = '#131826') {
            const out = document.createElement('canvas');
            out.width = srcCanvas.width;
            out.height = srcCanvas.height;
            const ctx = out.getContext('2d');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, out.width, out.height);
            ctx.drawImage(srcCanvas, 0, 0);
            // Subtle border helps iOS thumbnail heuristics
            ctx.strokeStyle = '#2a3145';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, out.width - 2, out.height - 2);
            return out;
        }

        // Clone-based card capture — avoids modifying the live DOM and
        // ensures html2canvas sees resolved (non-variable) CSS on all platforms
        async function captureCardAsCanvas(card) {
            const clone = card.cloneNode(true);

            // Remove interactive elements from the clone
            const shareBtn = clone.querySelector('.share-btn');
            if (shareBtn) shareBtn.remove();

            // Keep in viewport so iOS fully paints the layer, but invisible + non-interactive
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'position:fixed;inset:0;opacity:0;pointer-events:none;z-index:2147483647;';

            // Inject style overrides with hardcoded colors (no var() references)
            const styleEl = document.createElement('style');
            styleEl.textContent = getShareStyleOverrides();
            wrapper.appendChild(styleEl);

            // Container sets the card width and acts as the capture root
            const container = document.createElement('div');
            container.className = 'share-capture-root';
            container.style.cssText = `position:absolute;left:0;top:0;width:${card.offsetWidth}px;background:#131826;`;
            container.appendChild(clone);
            wrapper.appendChild(container);

            document.body.appendChild(wrapper);

            // Double rAF ensures layout is fully committed (more reliable than offsetHeight on iOS)
            await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

            const canvas = await html2canvas(container, {
                backgroundColor: '#131826',
                scale: 2,
                useCORS: true,
                logging: false
            });

            document.body.removeChild(wrapper);
            return canvas;
        }

        // Share current conditions card as image
        async function shareCurrentCard() {
            const card = document.querySelector('.card:not(.forecast-card):not(.satellite-card)');
            if (!card) return;

            const btn = document.querySelector('.share-btn');
            const origHTML = btn ? btn.innerHTML : '';

            // Show spinner while capturing
            if (btn) {
                btn.innerHTML = '<span style="display:inline-block;animation:spin 0.8s linear infinite;">↻</span>';
                btn.disabled = true;
            }

            const loc = activeLocation ? extractDisplayName(activeLocation.name) : 'Unknown';

            try {
                const canvas = await captureCardAsCanvas(card);
                const flat = flattenToOpaqueCanvas(canvas, '#131826');

                const blob = await new Promise(resolve => flat.toBlob(resolve, 'image/jpeg', 0.92));
                const file = new File([blob], `weather-${loc.replace(/\s+/g, '-').toLowerCase()}.jpg`, { type: 'image/jpeg' });

                // Try sharing with image file (works on iOS Safari 15+)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: `Weather in ${loc}`,
                        text: `Current weather in ${loc}`,
                        files: [file]
                    });
                } else if (navigator.share) {
                    // Fallback: share text only if file sharing unsupported
                    const shareText = buildShareText(card, loc);
                    await navigator.share({ title: `Weather in ${loc}`, text: shareText });
                } else {
                    // Desktop fallback: download the image
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `weather-${loc.replace(/\s+/g, '-').toLowerCase()}.jpg`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showShareSuccess(btn, origHTML);
                    return;
                }
            } catch (err) {
                if (err.name !== 'AbortError') console.log('Share error:', err);
            } finally {
                if (btn) {
                    btn.innerHTML = origHTML;
                    btn.disabled = false;
                }
            }
        }

        function buildShareText(card, loc) {
            const tempEl = card.querySelector('.temperature');
            const temp = tempEl ? tempEl.textContent.trim() : '';
            const details = card.querySelectorAll('.detail-item');
            let lines = [`🌡️ Weather in ${loc}: ${temp}`];
            details.forEach(item => {

                if (label && value) {
                    lines.push(`${label.textContent.trim()}: ${value.textContent.trim()}`);

        function getWindDirection(degrees) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.round(degrees / 22.5) % 16;
            return directions[index];
        }

        function formatSunTime(isoString) {
