<!DOCTYPE html>
<!--
    Weather Command Center
    Version: 0.3.0
    Last Updated: 2025-02-05
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Weather Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #131826;
            --accent-primary: #00d4ff;
            --accent-secondary: #ff6b9d;
            --accent-warm: #ffa500;
            --text-primary: #e8edf5;
            --text-secondary: #8b95a8;
            --border: rgba(255, 255, 255, 0.1);
            --glow: rgba(0, 212, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 157, 0.06) 0%, transparent 50%);
            padding: 2rem;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 4rem;
            letter-spacing: 0.3rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 40px var(--glow);
        }

        .location-tabs {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.2s both;
        }
        
        .location-tabs-inner {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .location-tab {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            user-select: none;
        }

        .location-tab.dragging {
            opacity: 0.4;
            transform: scale(0.95);
        }

        .location-tab.drag-over {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.15);
            transform: scale(1.05);
        }

        .drag-handle {
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: grab;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .location-tab:hover .drag-handle {
            opacity: 1;
        }

        .location-tab:active .drag-handle {
            cursor: grabbing;
        }

        .location-tab:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .location-tab.active {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-color: transparent;
            color: white;
            font-weight: 600;
        }

        .location-tab .remove-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            line-height: 1;
        }

        .location-tab .remove-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        .location-tab.active .remove-btn {
            background: rgba(255, 255, 255, 0.3);
        }

        .location-tab.add-tab {
            border-style: dashed;
            border-width: 2px;
            color: var(--accent-primary);
            font-weight: 600;
            cursor: pointer;
        }

        .location-tab.add-tab:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .location-tab.add-tab .drag-handle {
            display: none;
        }

        .location-input {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            min-width: 250px;
        }

        .location-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--glow);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: fadeInUp 0.6s ease-out both;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.15rem;
            color: var(--accent-primary);
        }

        .source-badge {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            border: 1px solid var(--accent-primary);
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 600;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-warm) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px var(--glow));
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .forecast-card .forecast-grid {
            grid-template-columns: repeat(7, 1fr);
        }

        @media (max-width: 1400px) {
            .forecast-card .forecast-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .forecast-card .forecast-grid {
                grid-template-columns: repeat(7, 1fr);
            }
        }

        @media (max-width: 768px) {
            .forecast-card .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            }
        }

        .forecast-item {
            text-align: center;
            padding: 1.5rem 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-height: 220px;
        }

        .forecast-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-primary);
        }

        .forecast-day {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 0.3rem 0;
        }

        .forecast-temp-range {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .temp-high {
            color: var(--accent-warm);
        }

        .temp-divider {
            color: var(--text-secondary);
        }

        .temp-low {
            color: var(--accent-primary);
        }

        .forecast-temp {
            font-size: 1rem;
            font-weight: 600;
        }

        .precip-chance {
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .wind-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .forecast-item.has-nws-forecast {
            min-height: auto;
        }

        .nws-forecast-text-inline {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: left;
        }

        .nws-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
        }

        .nws-text {
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        .today-tonight-card {
            margin-bottom: 1.5rem;
        }

        .today-tonight-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .today-tonight-grid {
                grid-template-columns: 1fr;
            }
        }

        .today-tonight-period {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .today-tonight-period:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-primary);
        }

        .period-name-large {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.15rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--accent-primary);
        }

        .period-forecast {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .satellite-card {
            margin-bottom: 2rem;
        }

        .satellite-container {
            margin-top: 1rem;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .radar-tabs {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .radar-tab {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            user-select: none;
        }

        .radar-tab:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .radar-tab.active {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-color: transparent;
            color: white;
            font-weight: 600;
        }

        .radar-tab-icon {
            font-size: 1rem;
        }

        .forecast-timeline-toggle {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            user-select: none;
            margin-left: auto;
        }

        .forecast-timeline-toggle:hover {
            border-color: var(--accent-warm);
            background: rgba(255, 165, 0, 0.1);
            transform: translateY(-2px);
        }

        .toggle-icon {
            font-size: 1rem;
        }

        .toggle-text {
            font-size: 0.75rem;
        }

        .location-picker-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        .location-picker-content {
            background: var(--bg-card);
            border: 2px solid var(--accent-primary);
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        .location-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .location-picker-header h3 {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.15rem;
            color: var(--accent-primary);
            margin: 0;
        }

        .location-picker-close {
            background: none;
            border: 2px solid var(--border);
            color: var(--text-primary);
            font-size: 1.5rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .location-picker-close:hover {
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
            transform: rotate(90deg);
        }

        .location-picker-results {
            overflow-y: auto;
            padding: 1rem;
            max-height: calc(80vh - 100px);
        }

        .location-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .location-option:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-primary);
            transform: translateX(5px);
        }

        .location-option-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .location-option-coords {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2) 0%, rgba(255, 165, 0, 0.2) 100%);
            border: 2px solid var(--accent-secondary);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .alert-title {
            font-weight: 600;
            color: var(--accent-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .alert-box {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.15) 0%, rgba(255, 107, 0, 0.15) 100%);
            border: 3px solid #ff4444;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        }

        .alerts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 1024px) {
            .alerts-container {
                grid-template-columns: 1fr;
            }
        }

        .alert-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .alert-section.active {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.15) 0%, rgba(255, 107, 0, 0.15) 100%);
            border: 3px solid #ff4444;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        }

        .alert-section.upcoming {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.15) 0%, rgba(255, 152, 0, 0.15) 100%);
            border: 3px solid #ffc107;
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.2);
        }

        .alert-section.upcoming .alert-title {
            color: #ffc107;
        }

        .alert-section.upcoming .alert-item {
            border-left-color: #ffc107;
        }

        .alert-section.upcoming .alert-event {
            color: #ffd54f;
        }

        .alert-onset-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-style: italic;
        }

        .no-alerts-message {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem 1rem;
            font-size: 0.95rem;
        }

        .alert-box-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 68, 68, 0.3);
        }

        .alert-icon {
            font-size: 2rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .alert-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.15rem;
            color: #ff4444;
            font-weight: 600;
            margin: 0;
        }

        .alert-item {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid #ff4444;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .alert-item:last-child {
            margin-bottom: 0;
        }

        .alert-event {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ff6666;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .alert-headline {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .alert-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .nws-forecast-card {
            margin-bottom: 1.5rem;
        }

        .nws-forecast-content {
            margin-top: 1rem;
        }

        .nws-forecast-period {
            padding: 1rem;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .nws-period-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.5rem;
            letter-spacing: 0.1rem;
            color: var(--accent-primary);
        }

        .nws-forecast-text {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-primary);
            padding: 0 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        .comparison-card {
            grid-column: 1 / -1;
        }

        .comparison-table {
            width: 100%;
            margin-top: 1rem;
            border-collapse: separate;
            border-spacing: 0;
        }

        .comparison-table th {
            background: rgba(0, 212, 255, 0.1);
            padding: 1rem;
            text-align: left;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.2rem;
            letter-spacing: 0.1rem;
            color: var(--accent-primary);
            border-bottom: 2px solid var(--accent-primary);
        }

        .comparison-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .comparison-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .timestamp {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 2rem;
            opacity: 0.7;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* ===== REORDER MODE STYLES ===== */
        .reorder-controls {
            display: flex;
            justify-content: center;
            margin-bottom: 0.75rem;
        }

        .reorder-toggle-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            display: none; /* Hidden by default, shown on touch devices */
        }

        .reorder-toggle-btn.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .move-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1.5px solid var(--accent-primary);
            color: var(--accent-primary);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }

        .move-btn:active {
            background: rgba(0, 212, 255, 0.3);
            transform: scale(0.9);
        }

        .move-btn.disabled {
            opacity: 0.25;
            pointer-events: none;
        }

        .reorder-active .move-btn {
            display: flex;
        }

        .reorder-active .remove-btn {
            display: none !important;
        }

        .reorder-active .drag-handle {
            display: none !important;
        }

        .reorder-active .location-tab {
            cursor: default;
        }

        .reorder-active .location-tab:hover {
            transform: none;
        }

        /* ===== TOUCH DEVICE DETECTION ===== */
        @media (pointer: coarse) {
            .reorder-toggle-btn {
                display: block;
            }
            .drag-handle {
                display: none;
            }
            .location-tab {
                padding: 0.7rem 1rem;

            }

        /* ===== TABLET (iPad) — 768px to 1024px ===== */

<body>
    <div class="header">
        <h1>WEATHER COMMAND CENTER</h1>
        <div id="locationTabs" class="location-tabs"></div>
    </div>

    <div id="weatherContainer"></div>

    <script>
        // Version
        const APP_VERSION = '0.3.0';
        
        // Location management
        let savedLocations = [];
        let activeLocation = null;
        let reorderMode = false;
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // Load saved locations from localStorage
        function loadSavedLocations() {
            const stored = localStorage.getItem('weatherLocations');
            if (stored) {
                savedLocations = JSON.parse(stored);
            } else {
                // Start with empty locations for new users
                savedLocations = [];
            }
            
            const activeLocationName = localStorage.getItem('activeLocation');
            if (activeLocationName) {
                activeLocation = savedLocations.find(loc => loc.name === activeLocationName) || savedLocations[0];
            } else if (savedLocations.length > 0) {
                activeLocation = savedLocations[0];
            } else {
                activeLocation = null;
            }
        }

        // Save locations to localStorage
        function saveLocations() {
            localStorage.setItem('weatherLocations', JSON.stringify(savedLocations));
            if (activeLocation) {
                localStorage.setItem('activeLocation', activeLocation.name);
            }
        }

        // Render location tabs
        function renderTabs() {
            const tabsContainer = document.getElementById('locationTabs');
            
            // Reorder controls (visible on touch devices)
            const reorderBtn = `
                <div class="reorder-controls">
                    <button class="reorder-toggle-btn ${reorderMode ? 'active' : ''}" onclick="toggleReorderMode()">
                        ${reorderMode ? '✓ Done Reordering' : '↕ Reorder Locations'}
                    </button>
                </div>
            `;
            
            const locationTabs = savedLocations.map((loc, index) => {
                const isFirst = index === 0;
                const isLast = index === savedLocations.length - 1;
                
                return `
                <div class="location-tab ${activeLocation && activeLocation.name === loc.name ? 'active' : ''}" 
                     ${!isTouchDevice ? 'draggable="true"' : ''}
                     data-index="${index}"
                     onclick="${reorderMode ? '' : `switchLocation(${index})`}"
                     ${!isTouchDevice ? `ondragstart="handleDragStart(event, ${index})"
                     ondragover="handleDragOver(event)"
                     ondrop="handleDrop(event, ${index})"
                     ondragend="handleDragEnd(event)"` : ''}>
                    ${!isTouchDevice ? '<span class="drag-handle">⋮⋮</span>' : ''}
                    <button class="move-btn ${isFirst ? 'disabled' : ''}" onclick="event.stopPropagation(); moveLocation(${index}, -1)" aria-label="Move up">◀</button>
                    ${loc.displayName}
                    <button class="move-btn ${isLast ? 'disabled' : ''}" onclick="event.stopPropagation(); moveLocation(${index}, 1)" aria-label="Move down">▶</button>
                    <button class="remove-btn" onclick="event.stopPropagation(); removeLocation(${index})">×</button>
                </div>
            `}).join('');
            
            const addButton = reorderMode ? '' : `
                <div class="location-tab add-tab" onclick="showAddLocationPrompt()">
                    <span style="font-size: 1.2rem;">+</span>
                    Add Location
                </div>
            `;
            
            tabsContainer.innerHTML = reorderBtn + `<div class="location-tabs-inner ${reorderMode ? 'reorder-active' : ''}">${locationTabs}${addButton}</div>`;
        }

        // Toggle reorder mode
        function toggleReorderMode() {
            reorderMode = !reorderMode;
            renderTabs();
        }

        // Move a location up or down in the list
        function moveLocation(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= savedLocations.length) return;
            
            const item = savedLocations[index];
            savedLocations.splice(index, 1);
            savedLocations.splice(newIndex, 0, item);
            
            saveLocations();
            renderTabs();
        }

        // Radar view management
        let activeRadarView = 'radar';
        let showForecastTimeline = false; // Toggle for forecast timeline

        function switchRadarView(view, location) {
            activeRadarView = view;
            renderRadarSection(location);
        }

        function toggleForecastTimeline(location) {
            showForecastTimeline = !showForecastTimeline;
            renderRadarSection(location);
        }

        function getWindyUrl(view, lat, lon) {
            const height = 1000; // Keep consistent height
            const detail = showForecastTimeline ? 'true' : 'false';
            const baseUrl = `https://embed.windy.com/embed2.html?lat=${lat}&lon=${lon}&detailLat=${lat}&detailLon=${lon}&width=650&height=${height}&zoom=9&level=surface`;
            const common = `&menu=&message=false&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=${detail}&metricWind=mph&metricTemp=%C2%B0F&radarRange=-1`;
            
            const overlays = {
                radar: '&overlay=radar&product=radar',
                satellite: '&overlay=satellite&product=satellite',
                wind: '&overlay=wind&product=ecmwf',
                temp: '&overlay=temp&product=ecmwf',
                clouds: '&overlay=clouds&product=ecmwf',
                rain: '&overlay=rain&product=ecmwf'
            };
            
            return baseUrl + overlays[view] + common;
        }

        function renderRadarSection(location) {
            const radarCard = document.querySelector('.satellite-card');
            if (!radarCard) return;
            
            const views = [
                { id: 'radar', name: 'Radar', icon: '📡' },
                { id: 'satellite', name: 'Satellite', icon: '🛰️' },
                { id: 'wind', name: 'Wind', icon: '💨' },
                { id: 'temp', name: 'Temperature', icon: '🌡️' },
                { id: 'clouds', name: 'Clouds', icon: '☁️' },
                { id: 'rain', name: 'Rain', icon: '🌧️' }
            ];
            
            const tabsHTML = views.map(view => `
                <div class="radar-tab ${activeRadarView === view.id ? 'active' : ''}" 
                     onclick="switchRadarView('${view.id}', { lat: ${location.lat}, lon: ${location.lon} })">
                    <span class="radar-tab-icon">${view.icon}</span>
                    ${view.name}
                </div>
            `).join('');
            
            radarCard.innerHTML = `
                <div class="card-header">
                    <div class="card-title">WEATHER MAPS</div>
                    <div class="source-badge">Windy</div>
                </div>
                <div class="radar-tabs">
                    ${tabsHTML}
                    <div class="forecast-timeline-toggle" 
                         onclick="toggleForecastTimeline({ lat: ${location.lat}, lon: ${location.lon} })"
                         title="Toggle hourly forecast timeline">
                        <span class="toggle-icon">${showForecastTimeline ? '📊' : '📈'}</span>
                        <span class="toggle-text">${showForecastTimeline ? 'Hide' : 'Show'} Timeline</span>
                    </div>
                </div>
                <div class="satellite-container">
                    <iframe 
                        src="${getWindyUrl(activeRadarView, location.lat, location.lon)}" 
                        frameborder="0"
                        class="windy-iframe"
                        style="width: 100%; height: 1000px; border-radius: 8px;">
                    </iframe>
                </div>
            `;
        }

        // Drag and drop handlers
        let draggedIndex = null;

        function handleDragStart(event, index) {
            draggedIndex = index;
            event.currentTarget.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const target = event.currentTarget;
            if (target.classList.contains('location-tab') && !target.classList.contains('add-tab')) {
                target.classList.add('drag-over');
            }
        }

        function handleDrop(event, dropIndex) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            
            if (draggedIndex === null || draggedIndex === dropIndex) return;
            
            // Reorder the locations array
            const draggedLocation = savedLocations[draggedIndex];
            savedLocations.splice(draggedIndex, 1);
            savedLocations.splice(dropIndex, 0, draggedLocation);
            
            saveLocations();
            renderTabs();
        }

        function handleDragEnd(event) {
            event.currentTarget.classList.remove('dragging');
            // Remove drag-over class from all tabs
            document.querySelectorAll('.location-tab').forEach(tab => {
                tab.classList.remove('drag-over');
            });
            draggedIndex = null;
        }

        // Show prompt to add new location
        function showAddLocationPrompt() {
            const locationName = prompt('Enter city name (e.g., "Denver" or "Seattle"):');
            if (locationName && locationName.trim()) {
                addNewLocation(locationName.trim());
            }
        }

        // Add a new location
        async function addNewLocation(locationName) {
            try {
                const location = await geocodeLocation(locationName);
                
                // Check if location already exists by coordinates
                const exists = savedLocations.find(loc => 
                    loc.lat && Math.abs(loc.lat - location.lat) < 0.01 && 
                    loc.lon && Math.abs(loc.lon - location.lon) < 0.01
                );
                if (exists) {
                    alert('This location is already saved!');
                    return;
                }
                
                const newLocation = {
                    name: location.name,
                    displayName: extractDisplayName(location.name),
                    lat: location.lat,
                    lon: location.lon,
                    country: location.country
                };
                
                savedLocations.push(newLocation);
                activeLocation = newLocation;
                saveLocations();
                renderTabs();
                fetchWeatherDataDirect(location.lat, location.lon, location);
            } catch (error) {
                if (error.message !== 'Location selection cancelled') {
                    alert('Error: ' + error.message);
                }
            }
        }

        // Switch to a different location tab
        function switchLocation(index) {
            activeLocation = savedLocations[index];
            saveLocations();
            renderTabs();
            // Use stored coordinates directly - no search needed
            fetchWeatherDataDirect(activeLocation.lat, activeLocation.lon, activeLocation);
        }

        // Remove a location
        function removeLocation(index) {
            const removedLocation = savedLocations[index];
            savedLocations.splice(index, 1);
            
            // If we removed the active location, switch to the first one or null
            if (activeLocation && activeLocation.name === removedLocation.name) {
                if (savedLocations.length > 0) {
                    activeLocation = savedLocations[0];
                    if (activeLocation.lat && activeLocation.lon) {
                        fetchWeatherDataDirect(activeLocation.lat, activeLocation.lon, activeLocation);
                    } else {
                        fetchWeatherData();
                    }
                } else {
                    activeLocation = null;
                    init(); // Show welcome screen
                }
            }
            
            saveLocations();
            renderTabs();
        }

        // Extract a short display name from full location
        function extractDisplayName(fullName) {
            // Try to get just the city name (before comma)
            const parts = fullName.split(',');
            return parts[0].trim();
        }

        const WEATHER_CODES = {
            0: { desc: 'Clear sky', icon: '☀️' },
            1: { desc: 'Mainly clear', icon: '🌤️' },
            2: { desc: 'Partly cloudy', icon: '⛅' },
            3: { desc: 'Overcast', icon: '☁️' },
            45: { desc: 'Foggy', icon: '🌫️' },
            48: { desc: 'Rime fog', icon: '🌫️' },
            51: { desc: 'Light drizzle', icon: '🌦️' },
            53: { desc: 'Moderate drizzle', icon: '🌦️' },
            55: { desc: 'Dense drizzle', icon: '🌧️' },
            61: { desc: 'Slight rain', icon: '🌧️' },
            63: { desc: 'Moderate rain', icon: '🌧️' },
            65: { desc: 'Heavy rain', icon: '⛈️' },
            71: { desc: 'Slight snow', icon: '🌨️' },
            73: { desc: 'Moderate snow', icon: '❄️' },
            75: { desc: 'Heavy snow', icon: '❄️' },
            77: { desc: 'Snow grains', icon: '🌨️' },
            80: { desc: 'Slight rain showers', icon: '🌦️' },
            81: { desc: 'Moderate rain showers', icon: '🌧️' },
            82: { desc: 'Violent rain showers', icon: '⛈️' },
            85: { desc: 'Slight snow showers', icon: '🌨️' },
            86: { desc: 'Heavy snow showers', icon: '❄️' },
            95: { desc: 'Thunderstorm', icon: '⛈️' },
            96: { desc: 'Thunderstorm with hail', icon: '⛈️' },
            99: { desc: 'Thunderstorm with heavy hail', icon: '⛈️' }
        };

        function getAQICategory(aqi) {
            if (aqi <= 50) return { level: 'Good', color: '#00e400', icon: '✓' };
            if (aqi <= 100) return { level: 'Moderate', color: '#ffff00', icon: '◐' };
            if (aqi <= 150) return { level: 'Unhealthy for Sensitive', color: '#ff7e00', icon: '⚠' };
            if (aqi <= 200) return { level: 'Unhealthy', color: '#ff0000', icon: '⚠' };
            if (aqi <= 300) return { level: 'Very Unhealthy', color: '#8f3f97', icon: '⚠⚠' };
            return { level: 'Hazardous', color: '#7e0023', icon: '⚠⚠⚠' };
        }

        function calculateFireRisk(temp, humidity, windSpeed) {
            // Simple fire risk calculation based on temperature, humidity, and wind
            let risk = 0;
            
            // Temperature factor (higher temp = higher risk)
            if (temp > 85) risk += 3;
            else if (temp > 75) risk += 2;
            else if (temp > 65) risk += 1;
            
            // Humidity factor (lower humidity = higher risk)
            if (humidity < 20) risk += 3;
            else if (humidity < 30) risk += 2;
            else if (humidity < 40) risk += 1;
            
            // Wind factor (higher wind = higher risk)
            if (windSpeed > 20) risk += 2;
            else if (windSpeed > 15) risk += 1;
            
            if (risk >= 7) return { level: 'Extreme', color: '#8b0000', icon: '🔥🔥🔥' };
            if (risk >= 5) return { level: 'High', color: '#ff4500', icon: '🔥🔥' };
            if (risk >= 3) return { level: 'Moderate', color: '#ffa500', icon: '🔥' };
            return { level: 'Low', color: '#90ee90', icon: '✓' };
        }

        function getWindDirection(degrees) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.round(degrees / 22.5) % 16;
            return directions[index];
        }

        async function geocodeLocation(locationName) {
            const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(locationName)}&count=10&language=en&format=json`);
            const data = await response.json();
            if (data.results && data.results.length > 0) {
                // If only one result, return it directly
                if (data.results.length === 1) {
                    return {
                        lat: data.results[0].latitude,
                        lon: data.results[0].longitude,
                        name: data.results[0].name,
                        country: data.results[0].country
                    };
                }
                
                // Multiple results - show picker
                return await showLocationPicker(data.results);
            }
            throw new Error('Location not found');
        }

        async function showLocationPicker(results) {
            return new Promise((resolve, reject) => {
                const modal = document.createElement('div');
                modal.className = 'location-picker-modal';
                
                const resultsHTML = results.map((result, index) => {
                    // Build a cleaner location string
                    const parts = [];
                    
                    // Always include the main name
                    parts.push(result.name);
                    
                    // Add state/region if different from name
                    if (result.admin1 && result.admin1 !== result.name) {
                        parts.push(result.admin1);
                    }
                    
                    // Add country
                    if (result.country) {
                        parts.push(result.country);
                    }
                    
                    const locationName = parts.join(', ');
                    
                    return `
                        <div class="location-option" onclick="selectLocation(${index})">
                            <div class="location-option-name">${locationName}</div>
                            <div class="location-option-coords">📍 ${result.latitude.toFixed(4)}°, ${result.longitude.toFixed(4)}°</div>
                        </div>
                    `;
                }).join('');
                
                modal.innerHTML = `
                    <div class="location-picker-content">
                        <div class="location-picker-header">
                            <h3>Select Location</h3>
                            <button class="location-picker-close" onclick="closeLocationPicker()">×</button>
                        </div>
                        <div class="location-picker-results">
                            ${resultsHTML}
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Store results and callbacks globally for onclick handlers
                window.locationPickerResults = results;
                window.locationPickerResolve = resolve;
                window.locationPickerReject = reject;
            });
        }

        function selectLocation(index) {
            const result = window.locationPickerResults[index];
            const location = {
                lat: result.latitude,
                lon: result.longitude,
                name: result.name,
                country: result.country
            };
            
            const resolve = window.locationPickerResolve;
            
            // Clear globals
            window.locationPickerResolve = null;
            window.locationPickerReject = null;
            window.locationPickerResults = null;
            
            // Remove modal
            const modal = document.querySelector('.location-picker-modal');
            if (modal) modal.remove();
            
            resolve(location);
        }

        function closeLocationPicker() {
            const reject = window.locationPickerReject;
            
            // Clear globals
            window.locationPickerResolve = null;
            window.locationPickerReject = null;
            window.locationPickerResults = null;
            
            // Remove modal
            const modal = document.querySelector('.location-picker-modal');
            if (modal) modal.remove();
            
            // Reject the promise
            if (reject) {
                reject(new Error('Location selection cancelled'));
            }
        }

        async function fetchOpenMeteo(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl,cloud_cover,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;
            const response = await fetch(url);
            return await response.json();
        }

        async function fetchAirQuality(lat, lon) {
            try {
                const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,pm10,pm2_5&timezone=auto`;
                const response = await fetch(url);
                return await response.json();
            } catch (error) {
                console.error('Air quality fetch error:', error);
                return null;
            }
        }

        async function fetchNWS(lat, lon) {
            try {
                const pointsResponse = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
                if (!pointsResponse.ok) return null;
                
                const pointsData = await pointsResponse.json();
                
                const [forecastResponse, alertsResponse] = await Promise.all([
                    fetch(pointsData.properties.forecast),
                    fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`)
                ]);
                
                const forecastData = await forecastResponse.json();
                const alertsData = await alertsResponse.json();
                
                return {
                    forecast: forecastData,
                    alerts: alertsData
                };
            } catch (error) {
                console.error('NWS fetch error:', error);
                return null;
            }
        }

        async function fetchWeatherData() {
            const container = document.getElementById('weatherContainer');
            const previousContent = container.innerHTML;
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading weather data...</div>';

            try {
                let locationName = activeLocation ? activeLocation.name : '';
                
                if (!locationName) {
                    throw new Error('No location specified');
                }
                
                const location = await geocodeLocation(locationName);
                
                const [openMeteoData, airQualityData, nwsData] = await Promise.all([
                    fetchOpenMeteo(location.lat, location.lon),
                    fetchAirQuality(location.lat, location.lon),
                    fetchNWS(location.lat, location.lon)
                ]);

                renderWeatherDashboard(openMeteoData, airQualityData, nwsData, location);
            } catch (error) {
                // If user cancelled location picker, restore previous view
                if (error.message === 'Location selection cancelled') {
                    container.innerHTML = previousContent;
                    return;
                }
                container.innerHTML = `<div class="card"><div class="alert-title">Error</div><p>${error.message}</p></div>`;
            }
        }

        // Fetch weather data using coordinates directly (no search/picker)
        async function fetchWeatherDataDirect(lat, lon, location) {
            const container = document.getElementById('weatherContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading weather data...</div>';

            try {
                const [openMeteoData, airQualityData, nwsData] = await Promise.all([
                    fetchOpenMeteo(lat, lon),
                    fetchAirQuality(lat, lon),
                    fetchNWS(lat, lon)
                ]);

                renderWeatherDashboard(openMeteoData, airQualityData, nwsData, location);
            } catch (error) {
                container.innerHTML = `<div class="card"><div class="alert-title">Error</div><p>${error.message}</p></div>`;
            }
        }

        function renderWeatherDashboard(openMeteo, airQuality, nws, location) {
            const container = document.getElementById('weatherContainer');
            const current = openMeteo.current;
            const weatherCode = WEATHER_CODES[current.weather_code] || WEATHER_CODES[0];

            // Calculate fire risk
            const fireRisk = calculateFireRisk(current.temperature_2m, current.relative_humidity_2m, current.wind_speed_10m);

            // Get AQI data
            let aqiHTML = '';
            if (airQuality && airQuality.current && airQuality.current.us_aqi) {
                const aqiCategory = getAQICategory(airQuality.current.us_aqi);
                aqiHTML = `
                    <div class="detail-item">
                        <div class="detail-label">Air Quality</div>
                        <div class="detail-value" style="color: ${aqiCategory.color}">
                            ${aqiCategory.icon} ${Math.round(airQuality.current.us_aqi)}
                        </div>
                        <div class="detail-label" style="margin-top: 0.2rem; font-size: 0.65rem;">${aqiCategory.level}</div>
                    </div>
                `;
            }

            const forecastHTML = openMeteo.daily.time.slice(0, 7).map((date, i) => {
                const dayCode = WEATHER_CODES[openMeteo.daily.weather_code[i]] || WEATHER_CODES[0];
                
                // Parse date string properly to avoid timezone issues
                // date format is "2025-02-05"
                const dateParts = date.split('-');
                const year = parseInt(dateParts[0]);
                const month = parseInt(dateParts[1]) - 1; // Month is 0-indexed
                const day = parseInt(dateParts[2]);
                const localDate = new Date(year, month, day);
                
                const dayName = localDate.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
                const fullDayName = localDate.toLocaleDateString('en-US', { weekday: 'long' });
                const dateDisplay = localDate.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
                
                const precipProb = openMeteo.daily.precipitation_probability_max[i] || 0;
                const windSpeed = Math.round(openMeteo.daily.wind_speed_10m_max[i]);
                const windDir = getWindDirection(openMeteo.daily.wind_direction_10m_dominant[i]);
                
                // Find matching NWS forecast periods for this day (day and night)
                let nwsForecastSection = '';
                if (nws && nws.forecast && nws.forecast.properties.periods) {
                    const periods = nws.forecast.properties.periods;
                    
                    // Match NWS periods by comparing the date components
                    // NWS period startTime is in ISO format with timezone
                    const matchingPeriods = periods.filter(period => {
                        const periodStart = new Date(period.startTime);
                        return periodStart.getFullYear() === year &&
                               periodStart.getMonth() === month &&
                               periodStart.getDate() === day;
                    });
                    
                    // If we have matching periods, show them as subsections
                    if (matchingPeriods.length > 0) {
                        const subsections = matchingPeriods.map(period => `
                            <div style="margin-bottom: ${matchingPeriods.length > 1 ? '1rem' : '0'};">
                                <div style="font-weight: 600; color: var(--accent-primary); margin-bottom: 0.5rem;">${period.name}:</div>
                                <div>${period.detailedForecast}</div>
                            </div>
                        `).join('');
                        
                        // Remove the margin-bottom from the last subsection
                        const finalSubsections = subsections.replace(/margin-bottom: 1rem;(?!.*margin-bottom: 1rem;)/s, 'margin-bottom: 0;');
                        
                        nwsForecastSection = `
                            <div class="nws-forecast-text-inline">
                                <div class="nws-label">NWS:</div>
                                <div class="nws-text">
                                    ${finalSubsections}
                                </div>
                            </div>
                        `;
                    }
                }
                
                return `
                    <div class="forecast-item ${nwsForecastSection ? 'has-nws-forecast' : ''}">
                        <div class="forecast-day">${dayName}</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: -0.25rem; margin-bottom: 0.5rem;">${dateDisplay}</div>
                        <div class="forecast-icon">${dayCode.icon}</div>
                        <div class="forecast-temp-range">
                            <span class="temp-high">${Math.round(openMeteo.daily.temperature_2m_max[i])}°</span>
                            <span class="temp-divider">/</span>
                            <span class="temp-low">${Math.round(openMeteo.daily.temperature_2m_min[i])}°</span>
                        </div>
                        <div class="precip-chance">💧 ${precipProb}%</div>
                        <div class="wind-info">
                            <span style="font-size: 0.9rem;">💨</span> ${windSpeed} mph ${windDir}
                        </div>
                        ${nwsForecastSection}
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="grid">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">CURRENT</div>
                            <div class="source-badge">Live</div>
                        </div>
                        <div class="weather-main">
                            <div class="temperature">${Math.round(current.temperature_2m)}°F</div>
                            <div class="weather-icon">${weatherCode.icon}</div>
                        </div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-label">Condition</div>
                                <div class="detail-value">${weatherCode.desc}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Feels Like</div>
                                <div class="detail-value">${Math.round(current.apparent_temperature)}°F</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${current.relative_humidity_2m}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind</div>
                                <div class="detail-value">${Math.round(current.wind_speed_10m)} mph ${getWindDirection(current.wind_direction_10m)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Pressure</div>
                                <div class="detail-value">${Math.round(current.pressure_msl)} hPa</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">UV Index</div>
                                <div class="detail-value">${current.uv_index.toFixed(1)}</div>
                            </div>
                            ${aqiHTML}
                            <div class="detail-item">
                                <div class="detail-label">Fire Risk</div>
                                <div class="detail-value" style="color: ${fireRisk.color}">
                                    ${fireRisk.icon} ${fireRisk.level}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card forecast-card">
                        <div class="card-header">
                            <div class="card-title">7-DAY FORECAST</div>
                            <div class="source-badge">Open-Meteo</div>
                        </div>
                        <div class="forecast-grid">
                            ${forecastHTML}
                        </div>
                    </div>
                </div>

                ${nws && nws.alerts && nws.alerts.features && nws.alerts.features.length > 0 ? (() => {
                    const now = new Date();
                    const activeAlerts = [];
                    const upcomingAlerts = [];
                    
                    // Split alerts by onset time
                    nws.alerts.features.forEach(alert => {
                        const onset = new Date(alert.properties.onset);
                        if (onset <= now) {
                            activeAlerts.push(alert);
                        } else {
                            upcomingAlerts.push(alert);
                        }
                    });
                    
                    return `
                        <div class="alerts-container">
                            <div class="alert-section active">
                                <div class="alert-box-header">
                                    <span class="alert-icon">⚠️</span>
                                    <span class="alert-title">ACTIVE ALERTS</span>
                                </div>
                                ${activeAlerts.length > 0 ? activeAlerts.map(alert => `
                                    <div class="alert-item">
                                        <div class="alert-event">${alert.properties.event}</div>
                                        <div class="alert-headline">${alert.properties.headline}</div>
                                    </div>
                                `).join('') : '<div class="no-alerts-message">No active alerts at this time</div>'}
                            </div>
                            
                            <div class="alert-section upcoming">
                                <div class="alert-box-header">
                                    <span class="alert-icon">🔔</span>
                                    <span class="alert-title">UPCOMING ALERTS</span>
                                </div>
                                ${upcomingAlerts.length > 0 ? upcomingAlerts.map(alert => {
                                    const onset = new Date(alert.properties.onset);
                                    const onsetStr = onset.toLocaleString('en-US', { 
                                        weekday: 'short', 
                                        month: 'short', 
                                        day: 'numeric', 
                                        hour: 'numeric', 
                                        minute: '2-digit'
                                    });
                                    return `
                                        <div class="alert-item">
                                            <div class="alert-event">${alert.properties.event}</div>
                                            <div class="alert-headline">${alert.properties.headline}</div>
                                            <div class="alert-onset-time">Starts: ${onsetStr}</div>
                                        </div>
                                    `;
                                }).join('') : '<div class="no-alerts-message">No upcoming alerts</div>'}
                            </div>
                        </div>
                    `;
                })() : ''}

                <div class="card satellite-card">
                    <!-- Radar section will be rendered by renderRadarSection -->
                </div>

                <div class="timestamp">
                    Data updated: ${new Date().toLocaleString()} | Location: ${location.name}, ${location.country} | <span style="opacity: 0.6;">v${APP_VERSION}</span>
                </div>
            `;
            
            // Render radar section with tabs
            renderRadarSection(location);
        }

        // Initialize the dashboard
        function init() {
            console.log(`Weather Command Center v${APP_VERSION}`);
            loadSavedLocations();
            renderTabs();
            
            if (activeLocation) {
                // Use stored coordinates if available, otherwise search
                if (activeLocation.lat && activeLocation.lon) {
                    fetchWeatherDataDirect(activeLocation.lat, activeLocation.lon, activeLocation);
                } else {
                    fetchWeatherData();
                }
            } else {
                // Show welcome message for new users
                const container = document.getElementById('weatherContainer');
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 2rem 1.5rem;">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">🌤️</div>
                        <h2 style="font-family: 'Bebas Neue', cursive; font-size: clamp(1.8rem, 5vw, 2.5rem); color: var(--accent-primary); margin-bottom: 1rem; letter-spacing: 0.1rem;">Welcome to Weather Command Center</h2>
                        <p style="font-size: clamp(0.85rem, 2.5vw, 1.1rem); color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6;">
                            Get started by adding your first location.<br>
                            Click the <span style="color: var(--accent-primary); font-weight: 600;">+ Add Location</span> button above, or enter a location below.
                        </p>
                        <div style="display: flex; gap: 0.75rem; justify-content: center; align-items: center; flex-wrap: wrap;">
                            <input type="text" id="welcomeInput" class="location-input" placeholder="Enter your location (e.g., Miami, Portland)" style="max-width: 400px; width: 100%; font-size: 16px;">
                            <button onclick="addFirstLocation()" class="btn">Get Started</button>
                        </div>
                    </div>
                `;
            }
        }

        // Add first location from welcome screen
        async function addFirstLocation() {
            const input = document.getElementById('welcomeInput');
            const locationName = input ? input.value.trim() : '';
            
            if (!locationName) {
                alert('Please enter a location name');
                return;
            }
            
            try {
                const location = await geocodeLocation(locationName);
                
                const newLocation = {
                    name: location.name,
                    displayName: extractDisplayName(location.name),
                    lat: location.lat,
                    lon: location.lon,
                    country: location.country
                };
                
                savedLocations.push(newLocation);
                activeLocation = newLocation;
                saveLocations();
                renderTabs();
                fetchWeatherDataDirect(location.lat, location.lon, location);
            } catch (error) {
                if (error.message !== 'Location selection cancelled') {
                    alert('Error: ' + error.message);
                }
            }
        }

        // Load weather on page load
        init();
    </script>
</body>
</html>
